<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CaboCipher</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1620;
      --text:#e7edf5;
      --muted:#9fb0c3;
      --line:#223044;
      --accent:#6ee7ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 20% 10%, rgba(110,231,255,.12), transparent 55%),
                  radial-gradient(900px 700px at 80% 30%, rgba(167,139,250,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }
    .wrap{width:min(980px,100%); display:grid; gap:14px}
    .top{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap}
    .title{font-weight:650; letter-spacing:.2px}
    .controls{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    select, input{
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      color:var(--text);
      border-radius: 12px;
      padding:9px 10px;
      outline:none;
      font-size:13px;
    }
    select:focus, input:focus{border-color: rgba(110,231,255,.45)}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 30%), var(--panel);
      border:1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .grid{display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:14px}
    @media (max-width: 860px){ .grid{grid-template-columns:1fr} }
    .pane{display:grid; gap:8px}
    .hdr{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .hdr b{font-size:13px}
    .hdr .mini{color:var(--muted); font-size:12px}
    textarea{
      width:100%;
      min-height:180px;
      resize: vertical;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.09);
      color:var(--text);
      border-radius: 14px;
      padding:12px;
      outline:none;
      line-height:1.35;
      font-size:14px;
    }
    textarea:focus{border-color: rgba(110,231,255,.45)}
    textarea[readonly]{opacity:.95}
    .btns{display:flex; gap:10px; flex-wrap:wrap}
    button{
      border:0;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      padding:9px 10px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:600;
      font-size:13px;
      transition: transform .06s ease, border-color .15s ease, filter .15s ease;
      user-select:none;
    }
    button:hover{filter:brightness(1.05); border-color: rgba(110,231,255,.35)}
    button:active{transform: translateY(1px)}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace}
    .status{
      padding:10px 14px 14px;
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .pill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }
    .ok{border-color: rgba(110,231,255,.25)}
    .bad{border-color: rgba(255,107,107,.25); color:#ffb4b4}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">CaboCipher</div>
      <div class="controls">
        <label class="mini" style="color:var(--muted); font-size:12px">Key set</label>
        <select id="keyver">
          <option value="v1">v1</option>
          <option value="v2">v2</option>
          <option value="v3" selected>v3</option>
          <option value="v4">v4</option>
          <option value="v5">v5</option>
        </select>
        <label class="mini" style="color:var(--muted); font-size:12px">Base</label>
        <input id="basekey" class="mono" type="text" value="sixseven" spellcheck="false" />
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div class="pane">
          <div class="hdr">
            <b>Encode</b>
            <div class="btns">
              <button id="copyEnc">Copy output</button>
              <button id="clearEnc">Clear</button>
            </div>
          </div>
          <textarea id="encIn" placeholder="Type here…"></textarea>
          <div class="hdr">
            <span class="mini">Output</span>
          </div>
          <textarea id="encOut" readonly class="mono" placeholder="Encoded output…"></textarea>
        </div>

        <div class="pane">
          <div class="hdr">
            <b>Decode</b>
            <div class="btns">
              <button id="copyDec">Copy output</button>
              <button id="clearDec">Clear</button>
            </div>
          </div>
          <textarea id="decIn" class="mono" placeholder="Paste coded text here…"></textarea>
          <div class="hdr">
            <span class="mini">Output</span>
          </div>
          <textarea id="decOut" readonly placeholder="Decoded output…"></textarea>
        </div>
      </div>

      <div class="status">
        <span id="stCrypto" class="pill">WebCrypto: checking…</span>
        <span id="stInfo" class="pill mono">Ready</span>
      </div>
    </div>
  </div>

<script>
const $ = (id)=>document.getElementById(id);

const baseKeyEl = $("basekey");
const keyVerEl  = $("keyver");

const encIn  = $("encIn");
const encOut = $("encOut");
const decIn  = $("decIn");
const decOut = $("decOut");

const stCrypto = $("stCrypto");
const stInfo   = $("stInfo");
let lastDecodedVer = null;

// Fixed salts (as requested): ' " , ;
const SALTS = ["'", '"', ",", ";"];
const VOWELS = new Set(["A","E","I","O","U"]);

function normBase(s){
  return (s||"").toString().trim();
}

function normAZ(s){
  return (s||"").toString().toUpperCase().replace(/[^A-Z]/g,"");
}

function bytesToB64Url(bytes){
  let bin="";
  for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64UrlToBytes(b64url){
  const b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
  const pad = b64.length % 4 ? '='.repeat(4 - (b64.length % 4)) : '';
  const bin = atob(b64 + pad);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
  return out;
}
function utf8ToBytes(s){ return new TextEncoder().encode(s); }
function bytesToUtf8(b){ return new TextDecoder().decode(b); }

async function sha256(bytes){
  const d = await crypto.subtle.digest("SHA-256", bytes);
  return new Uint8Array(d);
}
function concatBytes(...arrs){
  const total = arrs.reduce((s,a)=>s+a.length,0);
  const out = new Uint8Array(total);
  let off=0;
  for(const a of arrs){ out.set(a, off); off += a.length; }
  return out;
}

// Derive an A–Z keyword for the word-layer from (base + version) using SHA-256
async function deriveWordKeyAZ(base, ver, length=8){
  const seed = utf8ToBytes("SS-WORD|" + base + "|" + ver);
  const h = await sha256(seed);
  let out="";
  for(let i=0;i<length;i++){
    out += String.fromCharCode(65 + (h[i] % 26));
  }
  return out;
}

// Keystream blocks: SHA256(keyHash32 || iv || counter32be)
async function keystream(keyHash32, ivBytes, length, domainTag){
  const out = new Uint8Array(length);
  let written=0, counter=0;
  const domain = utf8ToBytes(domainTag);
  while(written < length){
    const ctr = new Uint8Array(4);
    ctr[0]=(counter>>>24)&255;
    ctr[1]=(counter>>>16)&255;
    ctr[2]=(counter>>>8)&255;
    ctr[3]=(counter)&255;
    const block = await sha256(concatBytes(domain, keyHash32, ivBytes, ctr));
    const take = Math.min(block.length, length-written);
    out.set(block.slice(0,take), written);
    written += take;
    counter++;
  }
  return out;
}

function letterToNum(ch){ return ch.charCodeAt(0)-65; }
function numToLetter(n){ return String.fromCharCode(((n%26)+26)%26 + 65); }

function pairSwap(wordAZ){
  const arr = wordAZ.split("");
  for(let i=0;i+1<arr.length;i+=2){
    const t=arr[i]; arr[i]=arr[i+1]; arr[i+1]=t;
  }
  return arr.join("");
}
function vigenereShift(wordAZ, keyAZ, dir){
  const out=[];
  for(let i=0;i<wordAZ.length;i++){
    const w=letterToNum(wordAZ[i]);
    const k=letterToNum(keyAZ[i%keyAZ.length]);
    out.push(numToLetter(w + dir*k));
  }
  return out.join("");
}
function countVowels(wordAZ){
  let c=0;
  for(const ch of wordAZ) if(VOWELS.has(ch)) c++;
  return c;
}
function saltForCount(v){
  if(v<=1) return SALTS[0];
  if(v===2) return SALTS[1];
  if(v===3) return SALTS[2];
  return SALTS[3];
}
function stripOuterPunct(token){
  const s=token;
  let i=0,j=s.length-1;
  while(i<=j && !/[A-Za-z]/.test(s[i])) i++;
  while(j>=i && !/[A-Za-z]/.test(s[j])) j--;
  return {lead:s.slice(0,i), core:s.slice(i,j+1), tail:s.slice(j+1)};
}
function encodeCoreWord(core, keyAZ){
  const orig = (core||"").toUpperCase().replace(/[^A-Z]/g,"");
  if(!orig) return core;
  const swapped = pairSwap(orig);
  const shifted = vigenereShift(swapped, keyAZ, +1);
  return shifted + saltForCount(countVowels(orig));
}
function decodeCoreWord(core, keyAZ){
  let up=(core||"").toUpperCase();
  if(!up) return core;
  const last=up[up.length-1];
  if(SALTS.includes(last)) up=up.slice(0,-1);
  const letters=up.replace(/[^A-Z]/g,"");
  if(!letters) return core;
  const unshift=vigenereShift(letters, keyAZ, -1);
  return pairSwap(unshift);
}
function wordEncodeMessage(text, keyAZ){
  const parts=(text||"").split(/(\s+)/);
  return parts.map(p=>{
    if(/^\s+$/.test(p)) return p;
    const {lead,core,tail}=stripOuterPunct(p);
    return lead + encodeCoreWord(core,keyAZ) + tail;
  }).join("");
}
function wordDecodeMessage(text, keyAZ){
  const parts=(text||"").split(/(\s+)/);
  return parts.map(p=>{
    if(/^\s+$/.test(p)) return p;
    const {lead,core,tail}=stripOuterPunct(p);
    return lead + decodeCoreWord(core,keyAZ) + tail;
  }).join("");
}

// 3-layer pack format:
// SS3.<ver>.<iv1>.<iv2>.<tag>.<data>
async function encodeAll(plain, base, ver){
  const wordKeyAZ = await deriveWordKeyAZ(base, ver, 8);
  const layer1 = wordEncodeMessage(plain, wordKeyAZ);

  const keyHash = await sha256(utf8ToBytes("SS-MASK|" + base + "|" + ver));
  const data0 = utf8ToBytes(layer1);

  // Layer 2 mask
  const iv1 = crypto.getRandomValues(new Uint8Array(12));
  const ks1 = await keystream(keyHash, iv1, data0.length, "SS-KS1");
  const data1 = new Uint8Array(data0.length);
  for(let i=0;i<data0.length;i++) data1[i]=data0[i]^ks1[i];

  // Layer 3 mask (second pass)
  const iv2 = crypto.getRandomValues(new Uint8Array(12));
  const ks2 = await keystream(keyHash, iv2, data1.length, "SS-KS2");
  const data2 = new Uint8Array(data1.length);
  for(let i=0;i<data1.length;i++) data2[i]=data1[i]^ks2[i];

  // Integrity tag (truncated SHA-256 over ver|iv1|iv2|data2) (not a secret MAC, just tamper signal)
  const tagBytes = await sha256(concatBytes(utf8ToBytes(ver+"|"), iv1, iv2, data2));
  const tag = bytesToB64Url(tagBytes.slice(0,10));

  return "SS3." + ver + "." + bytesToB64Url(iv1) + "." + bytesToB64Url(iv2) + "." + tag + "." + bytesToB64Url(data2);
}

async function decodeAll(packed, base, selectedVer){
  const s=(packed||"").trim();
  if(!s.startsWith("SS3.")) throw new Error("Bad input");
  const parts=s.split(".");
  // Expected: SS3.<ver>.<iv1>.<iv2>.<tag>.<data>
  if(parts.length !== 6) throw new Error("Bad input");
  const inVer = parts[1]; // version embedded in the text
  lastDecodedVer = inVer;
  const iv1=b64UrlToBytes(parts[2]);
  const iv2=b64UrlToBytes(parts[3]);
  const tag=parts[4];
  const data2=b64UrlToBytes(parts[5]);

  // Check tag (signal only)
  const tagBytes = await sha256(concatBytes(utf8ToBytes(inVer+"|"), iv1, iv2, data2));
  const expect = bytesToB64Url(tagBytes.slice(0,10));
  if(expect !== tag) throw new Error("Corrupted / modified text");

  const keyHash = await sha256(utf8ToBytes("SS-MASK|" + base + "|" + inVer));

  const ks2 = await keystream(keyHash, iv2, data2.length, "SS-KS2");
  const data1 = new Uint8Array(data2.length);
  for(let i=0;i<data2.length;i++) data1[i]=data2[i]^ks2[i];

  const ks1 = await keystream(keyHash, iv1, data1.length, "SS-KS1");
  const data0 = new Uint8Array(data1.length);
  for(let i=0;i<data1.length;i++) data0[i]=data1[i]^ks1[i];

  const layer1 = bytesToUtf8(data0);

  const wordKeyAZ = await deriveWordKeyAZ(base, inVer, 8);
  return wordDecodeMessage(layer1, wordKeyAZ);
}


function hasCrypto(function hasCrypto(){
  return !!(window.crypto && crypto.subtle && window.TextEncoder && window.TextDecoder);
}

function setCryptoStatus(){
  const ok = hasCrypto();
  stCrypto.textContent = ok ? "WebCrypto: available" : "WebCrypto: missing";
  stCrypto.className = "pill " + (ok ? "ok" : "bad");
}
setCryptoStatus();

async function refreshEncode(){
  if(!hasCrypto()){ encOut.value=""; return; }
  const base = normBase(baseKeyEl.value);
  const ver = keyVerEl.value; // selected key set (used for encoding); decoding reads version from text
  if(!base){ encOut.value=""; return; }
  try{
    const out = await encodeAll(encIn.value || "", base, ver);
    encOut.value = out;
    stInfo.textContent = "Ready";
  }catch(e){
    encOut.value = "";
    stInfo.textContent = "Encode error";
  }
}

async function refreshDecode(){
  if(!hasCrypto()){ decOut.value=""; return; }
  const base = normBase(baseKeyEl.value);
  const ver = keyVerEl.value; // selected key set (used for encoding); decoding reads version from text
  if(!base){ decOut.value=""; return; }
  const inp = decIn.value || "";
  if(!inp.trim()){ decOut.value=""; return; }
  try{
    const out = await decodeAll(inp, base, ver);
    decOut.value = out;
    if (lastDecodedVer && lastDecodedVer !== ver) {
      stInfo.textContent = "Decoded with " + lastDecodedVer + " (dropdown is " + ver + ")";
    } else {
      stInfo.textContent = "Ready";
    }
  }catch(e){
    decOut.value = "";
    stInfo.textContent = (e && e.message) ? e.message : "Decode error";
  }
}

async function copyText(el){
  const t = el.value || "";
  if(!t) return;
  try{ await navigator.clipboard.writeText(t); }
  catch{
    el.focus(); el.select();
    document.execCommand("copy");
    el.setSelectionRange(0,0);
  }
}

$("copyEnc").addEventListener("click", ()=>copyText(encOut));
$("copyDec").addEventListener("click", ()=>copyText(decOut));
$("clearEnc").addEventListener("click", ()=>{ encIn.value=""; encOut.value=""; refreshEncode(); });
$("clearDec").addEventListener("click", ()=>{ decIn.value=""; decOut.value=""; refreshDecode(); });

let encTimer=null, decTimer=null;
function debounce(fn, which){
  if(which==="enc"){ clearTimeout(encTimer); encTimer=setTimeout(fn, 120); }
  else { clearTimeout(decTimer); decTimer=setTimeout(fn, 120); }
}

encIn.addEventListener("input", ()=>debounce(refreshEncode,"enc"));
decIn.addEventListener("input", ()=>debounce(refreshDecode,"dec"));
baseKeyEl.addEventListener("input", ()=>{ debounce(refreshEncode,"enc"); debounce(refreshDecode,"dec"); });
keyVerEl.addEventListener("change", ()=>{ refreshEncode(); refreshDecode(); });

refreshEncode();
</script>
</body>
</html>
